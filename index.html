<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>MathCard</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <header class="jogo">
            <h1>MathCard</h1>
        </header>
        <div class="principal">
            <div class="top">
                <div class="questao">
                    <h3 id="tituloQuestao">Questão 1:</h3>
                    <p id="pergunta"></p>
                </div>
                <div class="tabela">
                    <span>Pontos: <span id="score">0</span></span>
                    <span>Tempo: <span id="tempo">30</span></span>
                    <span>Nível: <span id="nivel">Iniciante</span></span>
                </div>
            </div>
            <div class="resposta">
                <form id="formResposta">
                    <input type="number" id="respostaInput" placeholder="Resposta">
                    <button type="submit">Enviar</button>
                </form>
            </div>
            <div class="cartas">
                <div class="carta">?</div>
                <div class="carta">?</div>
                <div class="carta">?</div>
            </div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
